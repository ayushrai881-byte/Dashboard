<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayush Operations Dashboard - RESTORE MODE</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #4a90e2;
            --today-color: #f39c12;
            --done-color: #b2bec3;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background-color: #7f8c8d; padding: 6px 12px; border-radius: 6px; color: #fff; border: none; cursor: pointer; font-size: 13px; font-weight: bold; }
        
        .stats-bar { text-align: center; font-size: 14px; font-weight: bold; background: #eef5ff; padding: 15px; border-radius: 8px; display: flex; justify-content: space-around; margin-bottom: 20px;}

        form, .grid-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #fdfdfd; padding: 20px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px;}
        .full-width { grid-column: span 2; }
        input, select, button, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { background-color: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }

        .task-list { display: flex; flex-direction: column; gap: 15px; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-radius: 8px; background: #fff; border-left: 10px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .today-box { background-color: #fffdf0 !important; border: 1px solid #f1c40f !important; border-left: 10px solid #f39c12 !important; }
        
        /* Category Colors */
        .cat-swaraj { border-left-color: #74b9ff !important; }
        .cat-rs { border-left-color: #81ecec !important; }
        .cat-brickroute { border-left-color: #00b894 !important; }
        .cat-9am { border-left-color: #a29bfe !important; }
        .cat-qubikals { border-left-color: #fdcb6e !important; }
        .cat-colony { border-left-color: #ff7675 !important; }

        .task-item.done { opacity: 0.5; background: #eee; border-left-color: var(--done-color) !important; text-decoration: line-through; }
        .serial-no { font-size: 16px; font-weight: bold; color: #888; min-width: 30px;}
        .badges { display: flex; gap: 8px; font-size: 11px; flex-wrap: wrap; margin-top: 5px; }
        .badge { padding: 3px 8px; border-radius: 4px; font-weight: bold; border: 1px solid rgba(0,0,0,0.1); }

        .btn-group { display: flex; gap: 8px; }
        .done-btn { background-color: #2ed573; padding: 8px 12px; border-radius: 6px; }
        .today-btn { background-color: var(--today-color); padding: 8px 12px; border-radius: 6px; }

        /* Login */
        .auth-screen { max-width: 400px; margin: 80px auto; text-align: center; }
        #dashboardScreen { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card auth-screen" id="authContainer">
        <h2>🔐 Master Dashboard Login</h2>
        <input type="text" id="loginUser" placeholder="Username (ayushrai)">
        <input type="password" id="loginPass" placeholder="Password (Ayush123)">
        <button onclick="handleLogin()">Login & Restore Data</button>
    </div>

    <div class="card" id="dashboardScreen">
        <div class="header-row">
            <h1 id="userGreeting">🚀 Dashboard</h1>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
        
        <div class="stats-bar">
            <div>🌞 Today: <span id="todayCount">0</span></div>
            <div>⏳ Master Pending: <span id="pendingCount">0</span></div>
        </div>

        <div class="grid-section">
            <input type="text" id="searchFilter" class="full-width" placeholder="🔍 Search among 500+ tasks..." onkeyup="applyFilters()">
            <select id="filterStatus" onchange="applyFilters()">
                <option value="All">📂 View All Tasks</option>
                <option value="Today">🌞 Today's Focus</option>
                <option value="Pending">⏳ Pending List</option>
                <option value="Done">✔ Done Tasks</option>
            </select>
        </div>

        <div class="task-list" id="taskList"></div>
    </div>
</div>

<script>
    let currentUser = null;
    
    // Master Data for ayushrai
    const masterAyushTasks = [
        { name: "Achieve 50 enrollments for course", category: "9AM Trader", time: "24 Hours", priority: "High", status: "pending", isToday: false },
        { name: "Pencilbreaker website & Discord community", category: "9AM Trader", time: "8 Hours", priority: "High", status: "pending", isToday: false },
        { name: "Maschio chain oiling (46 number)", category: "Brickroute", time: "15 Min", priority: "High", status: "pending", isToday: false },
        { name: "PTO shaft greasing - Maschio Baler", category: "Brickroute", time: "30 Min", priority: "High", status: "pending", isToday: false },
        { name: "RS Printing: Receipts & Brochure", category: "RS Distribution", time: "2 Hours", priority: "High", status: "pending", isToday: false },
        { name: "Hire Extra Office Boy", category: "Qubikals", time: "2 Hours", priority: "High", status: "pending", isToday: false },
        { name: "Board lagwana plot sell ka", category: "Colony Bina", time: "2 Hours", priority: "High", status: "pending", isToday: false },
        { name: "Registry documents collection", category: "Colony Bina", time: "1 Hour", priority: "High", status: "pending", isToday: false },
        { name: "Swaraj/Mahindra dealer follow-up", category: "Swaraj", time: "1 Hour", priority: "High", status: "pending", isToday: false }
        // System will allow adding more via Bulk Add
    ];

    function handleLogin() {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value;
        
        if (u === 'ayushrai' && p === 'Ayush123') {
            currentUser = u;
            document.getElementById('authContainer').style.display='none';
            document.getElementById('dashboardScreen').style.display='block';
            
            // RESTORE LOGIC: If storage empty, load master data
            let existing = JSON.parse(localStorage.getItem(`tasks_${currentUser}`)) || [];
            if(existing.length < 5) {
                localStorage.setItem(`tasks_${currentUser}`, JSON.stringify(masterAyushTasks));
            }
            
            applyFilters();
        } else { alert("Invalid Credentials"); }
    }

    function applyFilters() {
        let tasks = JSON.parse(localStorage.getItem(`tasks_${currentUser}`)) || [];
        const search = document.getElementById('searchFilter').value.toLowerCase();
        const stat = document.getElementById('filterStatus').value;

        let filtered = tasks.filter(t => {
            const mS = t.name.toLowerCase().includes(search);
            let mSt = true;
            if(stat === 'Today') mSt = t.status === 'pending' && t.isToday;
            else if(stat === 'Pending') mSt = t.status === 'pending';
            else if(stat === 'Done') mSt = t.status === 'done';
            return mS && mSt;
        });

        document.getElementById('pendingCount').innerText = tasks.filter(x => x.status === 'pending').length;
        document.getElementById('todayCount').innerText = tasks.filter(x => x.isToday).length;
        renderTasks(filtered);
    }

    function toggleToday(id) {
        let t = JSON.parse(localStorage.getItem(`tasks_${currentUser}`));
        let x = t.find(i => i.id === id || i.name === id); // backup match
        if(x) { x.isToday = !x.isToday; localStorage.setItem(`tasks_${currentUser}`, JSON.stringify(t)); applyFilters(); }
    }

    function toggleDone(id) {
        let t = JSON.parse(localStorage.getItem(`tasks_${currentUser}`));
        let x = t.find(i => i.id === id || i.name === id);
        if(x) { x.status = x.status === 'done' ? 'pending' : 'done'; x.isToday = false; localStorage.setItem(`tasks_${currentUser}`, JSON.stringify(t)); applyFilters(); }
    }

    function renderTasks(tasks) {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        tasks.forEach((t, i) => {
            let c = 'cat-generic'; const lc = t.category.toLowerCase();
            if(lc.includes('swaraj')) c='cat-swaraj'; else if(lc.includes('rs')) c='cat-rs'; else if(lc.includes('9am')) c='cat-9am'; else if(lc.includes('qubikals')) c='cat-qubikals'; else if(lc.includes('brickroute')) c='cat-brickroute'; else if(lc.includes('colony')) c='cat-colony';
            
            const div = document.createElement('div');
            div.className = `task-item ${c} ${t.isToday ? 'today-box' : ''} ${t.status==='done'?'done':''}`;
            div.innerHTML = `
                <div class="task-info">
                    <div class="serial-no">#${i+1}</div>
                    <div>
                        <h3 style="margin:0;">${t.name}</h3>
                        <div class="badges">
                            <span class="badge">📁 ${t.category}</span>
                            <span class="badge">⏱️ ${t.time}</span>
                            ${t.isToday ? '<span class="badge" style="background:#f39c12;color:white;">⭐ TODAY</span>' : ''}
                        </div>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="today-btn" onclick="toggleToday('${t.id || t.name}')">${t.isToday?'Remove':'⭐ Today'}</button>
                    <button class="done-btn" onclick="toggleDone('${t.id || t.name}')">✔ Done</button>
                </div>`;
            list.appendChild(div);
        });
    }

    function handleLogout() { location.reload(); }
</script>
</body>
</html>
